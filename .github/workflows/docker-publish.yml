name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    # rebuild the CI image when the Dockerfile changes
    paths:
      - '.github/workflows/Dockerfile'

# drop all default permissions; grant least privilege per job
permissions: {}

jobs:
  Build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64
          cache-image: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/workflows/Dockerfile
          push: true
          tags: tylerkelly/rust-aptupdatechecker-ci:latest
          cache-from: type=registry,ref=tylerkelly/rust-aptupdatechecker-ci:latest
          cache-to: type=inline
